name: Build & Release

on:
  push:
    tags:
      - "v*"           # triggers on v1.0, v1.1, etc.
  workflow_dispatch:   # also lets you trigger manually from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: TomodachiTextureTool-Windows.exe
            dist_name: TomodachiTextureTool.exe
          - os: macos-latest
            artifact: TomodachiTextureTool-macOS
            dist_name: TomodachiTextureTool
          - os: ubuntu-latest
            artifact: TomodachiTextureTool-Linux
            dist_name: TomodachiTextureTool

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller TomodachiTextureTool.spec

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/${{ matrix.dist_name }} dist/${{ matrix.artifact }}
        shell: bash

      - name: Rename artifact (macOS / Linux)
        if: runner.os != 'Windows'
        run: mv dist/${{ matrix.dist_name }} dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tomodachi Texture Tool ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows  | `TomodachiTextureTool-Windows.exe` |
            | macOS    | `TomodachiTextureTool-macOS` |
            | Linux    | `TomodachiTextureTool-Linux` |

            > **macOS / Linux:** `chmod +x TomodachiTextureTool-*` before running.
            > **macOS:** Right-click → Open the first time if Gatekeeper blocks it.
          files: |
            dist/TomodachiTextureTool-Windows.exe
            dist/TomodachiTextureTool-macOS
            dist/TomodachiTextureTool-Linux
          draft: false
          prerelease: false
